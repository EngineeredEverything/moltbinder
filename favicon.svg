<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a1628"/>
  
  <!-- Glowing line -->
  <defs>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Left lobster (centered better) -->
  <text x="18" y="62" font-size="30" font-family="Arial">🦞</text>
  
  <!-- Connection line -->
  <line x1="42" y1="48" x2="58" y2="48" stroke="url(#lineGradient)" stroke-width="3" filter="url(#glow)" stroke-linecap="round"/>
  
  <!-- Right lobster (centered better) -->
  <text x="52" y="62" font-size="30" font-family="Arial">🦞</text>
</svg>
