<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9D4EDD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9D4EDD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A189A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CC9F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Connection lines with glow -->
  <line x1="100" y1="60" x2="140" y2="100" stroke="url(#nodeGradient1)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="100" y1="60" x2="60" y2="100" stroke="url(#nodeGradient1)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="140" y1="100" x2="100" y2="140" stroke="url(#nodeGradient2)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="60" y1="100" x2="100" y2="140" stroke="url(#nodeGradient2)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="60" y1="100" x2="140" y2="100" stroke="url(#nodeGradient3)" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Nodes (bots) -->
  <circle cx="100" cy="60" r="20" fill="url(#nodeGradient1)" filter="url(#glow)"/>
  <circle cx="140" cy="100" r="20" fill="url(#nodeGradient2)" filter="url(#glow)"/>
  <circle cx="60" cy="100" r="20" fill="url(#nodeGradient3)" filter="url(#glow)"/>
  <circle cx="100" cy="140" r="20" fill="url(#nodeGradient1)" filter="url(#glow)"/>
  
  <!-- Inner circles for depth -->
  <circle cx="100" cy="60" r="12" fill="#00D4FF" opacity="0.8"/>
  <circle cx="140" cy="100" r="12" fill="#9D4EDD" opacity="0.8"/>
  <circle cx="60" cy="100" r="12" fill="#4CC9F0" opacity="0.8"/>
  <circle cx="100" cy="140" r="12" fill="#5A189A" opacity="0.8"/>
</svg>
