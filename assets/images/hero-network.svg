<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A1F3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0E27;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="meshGlow1">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="meshGlow2">
      <stop offset="0%" style="stop-color:#9D4EDD;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9D4EDD;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="meshGlow3">
      <stop offset="0%" style="stop-color:#4CC9F0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4CC9F0;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Ambient mesh glows -->
  <circle cx="200" cy="150" r="200" fill="url(#meshGlow1)" opacity="0.5"/>
  <circle cx="800" cy="400" r="250" fill="url(#meshGlow2)" opacity="0.5"/>
  <circle cx="1000" cy="200" r="180" fill="url(#meshGlow3)" opacity="0.5"/>
  
  <!-- Network connections -->
  <line x1="150" y1="200" x2="400" y2="250" stroke="#00D4FF" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="400" y1="250" x2="700" y2="300" stroke="#4CC9F0" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="700" y1="300" x2="950" y2="200" stroke="#9D4EDD" stroke-width="2" opacity="0.4" filter="url(#glow)"/>
  <line x1="150" y1="200" x2="300" y2="400" stroke="#00D4FF" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <line x1="300" y1="400" x2="600" y2="450" stroke="#5A189A" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <line x1="600" y1="450" x2="950" y2="400" stroke="#9D4EDD" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <line x1="400" y1="250" x2="600" y2="450" stroke="#4CC9F0" stroke-width="1.5" opacity="0.2" filter="url(#glow)"/>
  <line x1="700" y1="300" x2="300" y2="400" stroke="#00D4FF" stroke-width="1.5" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Nodes (bots) -->
  <circle cx="150" cy="200" r="15" fill="#00D4FF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="150" cy="200" r="8" fill="#00D4FF"/>
  
  <circle cx="400" cy="250" r="18" fill="#4CC9F0" opacity="0.9" filter="url(#glow)"/>
  <circle cx="400" cy="250" r="10" fill="#4CC9F0"/>
  
  <circle cx="700" cy="300" r="20" fill="#9D4EDD" opacity="0.9" filter="url(#glow)"/>
  <circle cx="700" cy="300" r="12" fill="#9D4EDD"/>
  
  <circle cx="950" cy="200" r="16" fill="#5A189A" opacity="0.9" filter="url(#glow)"/>
  <circle cx="950" cy="200" r="9" fill="#5A189A"/>
  
  <circle cx="300" cy="400" r="14" fill="#00D4FF" opacity="0.9" filter="url(#glow)"/>
  <circle cx="300" cy="400" r="7" fill="#00D4FF"/>
  
  <circle cx="600" cy="450" r="17" fill="#4CC9F0" opacity="0.9" filter="url(#glow)"/>
  <circle cx="600" cy="450" r="9" fill="#4CC9F0"/>
  
  <circle cx="950" cy="400" r="19" fill="#9D4EDD" opacity="0.9" filter="url(#glow)"/>
  <circle cx="950" cy="400" r="11" fill="#9D4EDD"/>
  
  <!-- Particles/dots for depth -->
  <circle cx="250" cy="100" r="2" fill="#00D4FF" opacity="0.6"/>
  <circle cx="550" cy="150" r="2" fill="#4CC9F0" opacity="0.6"/>
  <circle cx="850" cy="100" r="2" fill="#9D4EDD" opacity="0.6"/>
  <circle cx="100" cy="300" r="2" fill="#00D4FF" opacity="0.5"/>
  <circle cx="450" cy="500" r="2" fill="#5A189A" opacity="0.5"/>
  <circle cx="800" cy="550" r="2" fill="#4CC9F0" opacity="0.5"/>
  <circle cx="1100" cy="300" r="2" fill="#9D4EDD" opacity="0.6"/>
</svg>
